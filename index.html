<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Find your ideal role based on your skills and interests.">
    <title>Skill2Role | Find Your Perfect Career Path</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="theme-switcher">
        <label for="theme-select">Theme</label>
        <select id="theme-select" aria-label="Select Theme">
            <option value="light">Light</option>
            <option value="dark">Dark</option>
            <option value="soft-blue">Soft Blue</option>
            <option value="midnight">Midnight</option>
            <option value="minimal-gray">Minimal Gray</option>
        </select>
    </div>
    <div class="container">
        <header>
            <h1>Skill2Role</h1>
            <p>Find your ideal role based on your skills and interests</p>
        </header>

        <main>
            <div class="input-section">
                <div class="form-group">
                    <label for="interest">Select Interests (Hold Ctrl/Cmd to select multiple)</label>
                    <select id="interest" aria-label="Select Interests" multiple size="6">
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="skills">Your Skills (comma separated)</label>
                    <input type="text" id="skills" placeholder="e.g. html, css, javascript, python" aria-label="Your Skills">
                </div>
                
                <button id="find-roles-btn">Find Roles</button>
            </div>

            <div id="results" class="results-section hidden">
                <h2>Recommended Roles</h2>
                <p class="hint-text">💡 Click a role to search how to become one.</p>
                <div id="roles-container"></div>
            </div>

            <div id="saved-roles-section" class="results-section">
                <h2>⭐ Saved Roles</h2>
                <div id="saved-roles-container"></div>
            </div>
        </main>
    </div>
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
